<script>
(function () {
  const lang = (navigator.language || navigator.userLanguage || "").toLowerCase();
  const isZh = lang.startsWith('zh');
  const currentPath = window.location.pathname;

  // =========================
  // 中文用户禁止访问 /en
  // =========================
  if (isZh && currentPath.startsWith('/en')) {
    window.location.replace('/cn/product');
    return;
  }

  // =========================
  // 首页 / 根目录
  // =========================
  if (currentPath === '/') {
    if (isZh) {
      window.location.replace('/cn/product');
    } else {
      window.location.replace('/en/product');
    }
    return;
  }

  // =========================
  // 简化跳转：访问 /en 或 /cn 也自动到 /en/product 或 /cn/product
  // =========================
  if (currentPath === '/en') {
    window.location.replace('/en/product');
    return;
  }

  if (currentPath === '/cn') {
    window.location.replace('/cn/product');
    return;
  }

})();
</script>
